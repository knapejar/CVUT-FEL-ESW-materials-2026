<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Čti bez zámku — immersive video</title>
<link rel="icon" href="data:," />
<style>
  :root{
    --bg-top:#0a1d2b; --bg-bot:#04111a; --panel:#0a2433; --text:#eafaf1; --muted:#8fb3a2;
    --accent:#FFD34D; --accent2:#FF9E3D; --reader:#9af0fb; --quiescent:#5be08a; --danger:#FF5A5A;
    --v1:#c9a26b; --v2:#8fe3ff; --v3:#CDB4FF; --ink:#05231a; --border:#15394a;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg-bot);color:var(--text);overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  body{display:flex;flex-direction:column;align-items:center}
  #topbar{width:100%;display:flex;align-items:center;gap:14px;padding:8px 14px;background:var(--panel);border-bottom:1px solid var(--border);font-size:13px}
  #topbar .title{font-weight:800}
  #topbar .badge{background:rgba(255,211,77,.16);border:1px solid rgba(255,211,77,.4);color:var(--accent);padding:2px 9px;border-radius:999px;font-size:11px;font-weight:700}
  #topbar .hints{margin-left:auto;color:var(--muted);font-size:12px}
  #stagewrap{flex:1;width:100%;display:flex;align-items:center;justify-content:center;min-height:0}
  #stage{position:relative;width:min(96vw,calc((100vh - 150px)*16/9));aspect-ratio:16/9;background:#02080f;border:1px solid var(--border);border-radius:10px;overflow:hidden}
  #stage canvas{position:absolute;inset:0;width:100%!important;height:100%!important;display:block}
  #subtitle{position:absolute;left:0;right:0;bottom:0;padding:0 6% 4.5%;min-height:20%;display:flex;align-items:flex-end;justify-content:center;text-align:center;
    background:linear-gradient(to top,rgba(0,0,0,.78),rgba(0,0,0,.34) 55%,transparent);
    font-weight:800;font-size:clamp(15px,2.45vw,30px);line-height:1.25;text-shadow:0 2px 10px rgba(0,0,0,.85);pointer-events:none}
  .kw{position:relative;display:inline-block;white-space:nowrap;margin:0 .14em;transition:transform .12s ease}
  .kw .wb{opacity:.5}
  .kw .wf{position:absolute;left:0;top:0;width:0;overflow:hidden;color:var(--accent);text-shadow:0 0 16px rgba(255,211,77,.9)}
  .kw.active{transform:scale(1.06) translateY(-1px)}
  .kw.active .wf{text-shadow:0 0 16px rgba(255,211,77,.95)}
  #seclabel{position:absolute;top:3.5%;left:4%;color:#bdf0d2;font-weight:700;font-size:clamp(11px,1.5vw,18px);letter-spacing:2px;text-transform:uppercase;opacity:0;text-shadow:0 2px 8px #000;transition:opacity .5s}
  #bigplay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;cursor:pointer;
    background:radial-gradient(circle at 50% 42%,rgba(20,40,55,.85),rgba(2,8,12,.93));transition:opacity .5s;text-align:center;padding:6%}
  #bigplay.hidden{opacity:0;pointer-events:none}
  #bigplay .pbtn{width:84px;height:84px;border-radius:50%;background:linear-gradient(90deg,#FFD34D,#FF9E3D);color:#04111a;display:flex;align-items:center;justify-content:center;font-size:38px;box-shadow:0 10px 44px rgba(255,158,61,.5)}
  #bigplay .hint{max-width:580px;font-size:14px;color:#dff3e8} #bigplay .hint small{display:block;margin-top:6px;color:var(--muted)}
  #controls{width:min(96vw,calc((100vh - 150px)*16/9));display:flex;align-items:center;gap:10px;padding:9px 4px}
  #controls button{background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:8px;width:38px;height:34px;font-size:15px;cursor:pointer}
  #controls .time{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;min-width:42px;text-align:center}
  #seek{flex:1;-webkit-appearance:none;height:6px;border-radius:6px;background:linear-gradient(90deg,var(--accent) 0%,var(--accent) var(--p,0%),#234255 var(--p,0%));outline:none}
  #seek::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer}
  #err{position:absolute;left:8px;top:8px;z-index:9;color:#ff9b9b;font:12px ui-monospace,Consolas,monospace;white-space:pre-wrap;display:none}
</style>
</head>
<body>
  <div id="topbar">
    <span class="title">Čti bez zámku</span>
    <span class="badge">IMMERSIVE VIDEO 📖</span>
    <span class="hints">space = play/pause · ←/→ = ±5s · R = restart</span>
  </div>
  <div id="stagewrap"><div id="stage">
    <div id="seclabel"></div>
    <div id="subtitle"></div>
    <div id="bigplay">
      <div class="pbtn">▶</div>
      <div class="hint">RCU: čti bez čekání — výuková lyric-video k B4M36ESW. Každé slovo je sesynchronizované se zpěvem; animace ukazuje, jak Read-Copy-Update funguje.<small>~3 min 8 s · sung video-lesson · PixiJS</small></div>
    </div>
    <div id="err"></div>
  </div></div>
  <div id="controls">
    <button id="btnPlay">▶</button><button id="btnRestart">⟲</button>
    <span class="time" id="tCur">0:00</span>
    <input type="range" id="seek" min="0" max="187.704" step="0.01" value="0">
    <span class="time" id="tDur">3:08</span>
  </div>
  <audio id="player" preload="auto"></audio>

  <script src="vendor/pixi.min.js"></script>
  <script src="vendor/pixi-filters.js"></script>
  <script src="karaoke-cti-bez-zamku.js"></script>
  <script src="assets-cti-bez-zamku.js"></script>
  <script>(function(){ 'use strict';
  const showErr=(m)=>{const e=document.getElementById('err');if(!e)return;e.style.display='block';e.textContent+=m+"\n";};
  window.addEventListener('error',e=>showErr('ERR: '+(e&&e.message?e.message:e)));
  if(!window.PIXI){showErr('PixiJS failed to load');return;}

  // ============================================================
  //  0) AUDIO + KARAOKE DATA
  // ============================================================
  const player=document.getElementById('player');
  try{ player.src=encodeURI('../pisnicky/Čti bez zámku.mp3'); }catch(e){ showErr('audio src: '+e.message); }
  const KARAOKE=window.KARAOKE||{duration_ms:177320,lines:[]};
  const LINES=KARAOKE.lines||[];
  const STAGE_DUR=187.704;            // MP3 / stage length (fallback when audio.duration unavailable)

  // ============================================================
  //  1) MATH / EASING HELPERS (§2 single source of truth)
  // ============================================================
  const TAU=Math.PI*2;
  const clamp01=v=>v<0?0:v>1?1:v;
  const clamp=(v,a,b)=>v<a?a:v>b?b:v;
  const lerp=(a,b,p)=>a+(b-a)*p;
  function lerp2(p0,p1,p){ return [p0[0]+(p1[0]-p0[0])*p, p0[1]+(p1[1]-p0[1])*p]; }
  const ph=(t,a,b)=> (b===a)?(t>=b?1:0):clamp01((t-a)/(b-a));
  const easeOut=p=>{p=clamp01(p);return 1-(1-p)*(1-p);};            // quadratic out
  const easeOutCubic=p=>{p=clamp01(p);return 1-Math.pow(1-p,3);};
  const easeIn=p=>{p=clamp01(p);return p*p;};
  const easeInOut=p=>{p=clamp01(p);return p<.5?2*p*p:1-Math.pow(-2*p+2,2)/2;};
  function easeOutBack(p){p=clamp01(p);const c1=1.70158,c3=c1+1;return 1+c3*Math.pow(p-1,3)+c1*Math.pow(p-1,2);}
  function triWave(t,a,b){const u=ph(t,a,b);return 1-Math.abs(2*u-1);}
  function lerpColor(a,b,p){const ar=(a>>16)&255,ag=(a>>8)&255,ab=a&255;
    return((lerp(ar,(b>>16)&255,p)|0)<<16)|((lerp(ag,(b>>8)&255,p)|0)<<8)|(lerp(ab,b&255,p)|0);}
  // Beat (130 BPM)
  const BPM=130;
  const beat=t=>0.5+0.5*Math.sin(t*TAU*BPM/60);
  // GLOBAL beat gates (default 1.0; S20 ramps both to 0 over 177.32->180.0)
  function beatAmp(t){ return 1-easeInOut(ph(t,177.32,180.0)); }
  function lampWaveAmp(t){ return 1-easeInOut(ph(t,177.32,180.0)); }

  // ============================================================
  //  2) PALETTE
  // ============================================================
  const C={
    bgTop:0x0a1d2b, bgBot:0x04111a, bgTopCold:0x0a2330, bgBotCold:0x02080f,
    panel:0x0c2433, accent:0xFFD34D, accent2:0xFF9E3D, reader:0x9af0fb,
    quiescent:0x5be08a, danger:0xff5a5a, v1:0xc9a26b, v2:0x8fe3ff, v3:0xCDB4FF,
    text:0xeafaf1, muted:0x8fb3a2, ink:0x05231a, white:0xffffff
  };
  // Canonical world coords
  const W=1280,H=720;
  const LAMP=[720,180];
  const BOOK_V1=[640,150], BOOK_V2=[760,150], BOOK_V3=[880,150];
  const WAIT_TABLE=[340,470];
  const N_CORES=1024, N_LANES=12, N_CELLS=1024;
  const PIN_V1=[2,5,8];
  const NONPIN=[0,1,3,4,6,7,9,10,11];
  // table layout (two rows)
  const tableX=k=>150+(k%6)*145;
  const rowY=k=>(k<6?470:560);
  const seatOf=k=>[tableX(k),rowY(k)];
  const lampPos=k=>[tableX(k),rowY(k)+34];
  const angleTo=(px,py)=>Math.atan2(py-LAMP[1],px-LAMP[0]);
  const angleToV1=angleTo(BOOK_V1[0],BOOK_V1[1]);
  const angleToV2=angleTo(BOOK_V2[0],BOOK_V2[1]);
  const angleToV3=angleTo(BOOK_V3[0],BOOK_V3[1]);

  // ============================================================
  //  3) PIXI APP + LAYERS (REFERENCE §1)
  // ============================================================
  const app=new PIXI.Application({width:W,height:H,antialias:true,backgroundColor:C.bgBot,backgroundAlpha:1,resolution:1,powerPreference:'high-performance'});
  app.ticker.maxFPS=60;
  document.getElementById('stage').insertBefore(app.view, document.getElementById('seclabel'));

  const cameraRoot=new PIXI.Container();
  const bgLayer=new PIXI.Container();
  const sceneLayer=new PIXI.Container();
  const fxLayer=new PIXI.Container();
  const overlayFx=new PIXI.Container();
  cameraRoot.addChild(bgLayer,sceneLayer,fxLayer,overlayFx);
  app.stage.addChild(cameraRoot);
  cameraRoot.pivot.set(W/2,H/2);
  cameraRoot.position.set(W/2,H/2);
  overlayFx.filterArea=new PIXI.Rectangle(0,0,W,H);
  overlayFx.filters=[];

  // ---------- F-guard helper (REFERENCE §7) ----------
  const F=(window.PIXI&&PIXI.filters)||{};
  function hasF(name){ return !!F[name]; }

  // overlayFx: ordered name-keyed owned filter list
  const _ofx=[]; // {name, filter}
  function addOverlayFx(name,filter){
    if(!filter) return;
    if(_ofx.some(o=>o.name===name)) return;
    _ofx.push({name,filter});
    overlayFx.filters.push(filter);
  }
  function removeOverlayFx(name){
    const i=_ofx.findIndex(o=>o.name===name);
    if(i<0) return;
    const f=_ofx[i].filter;
    _ofx.splice(i,1);
    const j=overlayFx.filters.indexOf(f);
    if(j>=0) overlayFx.filters.splice(j,1);
  }
  function hasOverlayFx(name){ return _ofx.some(o=>o.name===name); }

  // ============================================================
  //  3b) NULL-SAFE HERO IMAGE PIPELINE (storyboard §7 / §6.24)
  //  Optional keyed PNGs in videos/assets/img/<slug>.png layer ADDITIVELY / low-alpha
  //  ON TOP of the always-drawn vector actors. With NO images present the video is a
  //  COMPLETE, visually-unchanged vector masterpiece. Loader is fire-and-forget (the
  //  main IIFE is NOT async); persistent targets attach in the resolve callback, scene
  //  actors guard every use with if(IMG[slug]). Sprites are STATIC decoration — their
  //  existence never depends on audio time, so __seek / the GOLDEN RULE are unaffected.
  // ============================================================
  const IMG={};
  const IMG_SPRITES={}; // refs to persistent attached sprites (book-v1/v2 toggled by tone)
  // Hero images are inlined as base64 data URIs in assets-cti-bez-zamku.js (window.ASSETS).
  // WHY base64 and not a file path: opened from file:// (double-click), Chrome blocks fetch() of
  // file:// URLs (so PIXI.Assets.load fails) AND treats a file:// <img> as cross-origin so the WebGL
  // texImage2D upload throws "image element contains cross-origin data". A data: URI is same-origin,
  // so the <img> loads AND uploads to a texture cleanly. Returns null if absent (fully null-safe:
  // if assets-cti-bez-zamku.js is missing, window.ASSETS is undefined and the video stays pure-vector).
  function tryLoad(slug){
    return new Promise(res=>{
      try{
        const src=(window.ASSETS&&window.ASSETS[slug]);
        if(!src){ res(null); return; }
        const img=new Image(); img.decoding='async';
        img.onload=()=>{ try{ res(PIXI.Texture.from(img)); }catch(e){ res(null); } };
        img.onerror=()=>res(null);
        img.src=src;
      }catch(e){ res(null); }
    });
  }
  // heroSprite: returns null if the texture is absent; else a 0.5-anchored Sprite scaled to ~targetW.
  function heroSprite(parent,slug,x,y,targetW,alpha,contain){
    if(!IMG[slug]) return null;
    const tex=IMG[slug]; const s=new PIXI.Sprite(tex); s.anchor.set(0.5);
    s.position.set(x,y);
    const tw=tex.width||1, th=tex.height||1;
    let sc=targetW/tw;
    if(contain){ // COVER fill: scale so it covers a targetW × (targetW*9/16) box (used for lounge-bg)
      const targetH=targetW*9/16; sc=Math.max(targetW/tw,targetH/th);
    }
    s.scale.set(sc);
    s.alpha=(alpha==null?0.95:alpha);
    parent.addChild(s);
    return s;
  }
  // Fire-and-forget loader for the 6 optional hero slugs. On resolve, store + attach persistents.
  (function loadHeroImages(){
    if(!window.PIXI) return; // loader uses <img> + PIXI.Texture.from (no fetch / no PIXI.Assets)
    const SLUGS=['book-v1','book-v2','signpost-lamp','reader-silhouette','hourglass','lounge-bg'];
    SLUGS.forEach(slug=>{ tryLoad(slug).then(tex=>{
      if(!tex) return; IMG[slug]=tex;
      try{
        if(slug==='lounge-bg'){
          // COVER-scale to fill 1280x720 at low atmosphere alpha, behind everything in bgLayer.
          const s=heroSprite(bgLayer,'lounge-bg',W/2,H/2,W,0.22,true);
          if(s){ bgLayer.setChildIndex(s,0); IMG_SPRITES['lounge-bg']=s; }
        } else if(slug==='signpost-lamp'){
          // over the persistent signpost lamp vector at the lamp hub region (local 70,30).
          const s=heroSprite(signpost,'signpost-lamp',70,30,120,0.95,false);
          if(s) IMG_SPRITES['signpost-lamp']=s;
        } else if(slug==='reader-silhouette'){
          // optional sprite over each persistent vector reader figure (alpha ~0.85).
          for(const R of READERS){ const s=heroSprite(R.cont,'reader-silhouette',0,0,70,0.85,false); if(s) R._img=s; }
        } else if(slug==='book-v1' || slug==='book-v2'){
          // over the persistent active book; toggled by tone in renderLounge (v1 tan / v2,v3 cyan).
          const s=heroSprite(activeBook,slug,0,0,150,0.95,false);
          if(s){ s.visible=false; IMG_SPRITES[slug]=s; }
        }
        // 'hourglass' has no persistent host — attached by the scene builders that draw it.
      }catch(e){ showErr('img '+slug+': '+e.message); }
    }); });
  })();

  // ============================================================
  //  4) TEXTURES + TEXT FACTORY
  // ============================================================
  function radialTex(hex){const c=document.createElement('canvas');c.width=c.height=128;const g=c.getContext('2d');
    const col='#'+hex.toString(16).padStart(6,'0');const gr=g.createRadialGradient(64,64,0,64,64,64);
    gr.addColorStop(0,col);gr.addColorStop(.45,col+'aa');gr.addColorStop(1,col+'00');g.fillStyle=gr;g.fillRect(0,0,128,128);return PIXI.Texture.from(c);}
  const GLOW={gold:radialTex(0xFFE9A8),amber:radialTex(0xFFB85C),cyan:radialTex(0x9af0fb),green:radialTex(0x7fe6a6),white:radialTex(0xffffff),red:radialTex(0xff8a8a),v1:radialTex(0xd9b888)};
  function glow(texKey,x,y,scale,alpha,tint){const s=new PIXI.Sprite(GLOW[texKey]);s.anchor.set(.5);s.x=x;s.y=y;s.scale.set(scale);s.alpha=alpha;s.blendMode=PIXI.BLEND_MODES.ADD;if(tint!=null)s.tint=tint;return s;}
  // a thin 1px white line tex for SimpleRope trails
  function lineTex(hex){const c=document.createElement('canvas');c.width=64;c.height=8;const g=c.getContext('2d');
    const col='#'+hex.toString(16).padStart(6,'0');const gr=g.createLinearGradient(0,0,0,8);
    gr.addColorStop(0,col+'00');gr.addColorStop(.5,col);gr.addColorStop(1,col+'00');g.fillStyle=gr;g.fillRect(0,0,64,8);return PIXI.Texture.from(c);}
  const TRAIL={cyan:lineTex(0x9af0fb),red:lineTex(0xff6a6a),gold:lineTex(0xFFE9A8)};
  // baked dot for particle swarms / cells
  const _dotG=new PIXI.Graphics().beginFill(0xffffff,1).drawCircle(0,0,8).endFill();
  const DOT_TEX=app.renderer.generateTexture(_dotG,{resolution:2}); _dotG.destroy();
  const _cellG=new PIXI.Graphics().beginFill(0xffffff,1).drawRoundedRect(0,0,12,12,3).endFill();
  const CELL_TEX=app.renderer.generateTexture(_cellG,{resolution:2}); _cellG.destroy();
  // baked radial-noise sprite for DisplacementFilter fallback
  function noiseTex(){const c=document.createElement('canvas');c.width=c.height=256;const g=c.getContext('2d');
    const img=g.createImageData(256,256);for(let i=0;i<img.data.length;i+=4){const v=Math.random()*255;img.data[i]=v;img.data[i+1]=Math.random()*255;img.data[i+2]=128;img.data[i+3]=255;}
    g.putImageData(img,0,0);return PIXI.Texture.from(c);}
  const NOISE_TEX=noiseTex();

  function txt(str,size,color,weight){const t=new PIXI.Text(str,{fontFamily:'Arial, Helvetica, sans-serif',fontSize:size,fill:color,fontWeight:weight||'700',align:'center',
    dropShadow:true,dropShadowColor:0x000000,dropShadowBlur:4,dropShadowAlpha:.5,dropShadowDistance:2});t.anchor.set(.5);t.resolution=2;return t;}
  // attach persistent Outline+DropShadow to a text (legibility, §2 typography)
  function legible(t){
    const arr=[];
    if(hasF('OutlineFilter')) arr.push(new F.OutlineFilter(2,C.ink,0.25));
    if(hasF('DropShadowFilter')) arr.push(new F.DropShadowFilter({offset:{x:2,y:2},blur:4,alpha:0.5,color:0x000000,quality:2}));
    if(arr.length) t.filters=arr;
    return t;
  }

  // ============================================================
  //  5) BACKGROUND (room gradient + shelves + dust + reflection)
  // ============================================================
  const skyG=new PIXI.Graphics(); bgLayer.addChild(skyG);
  let _skyTop=C.bgTop,_skyBot=C.bgBot,_skyKey='';
  function drawSky(topCol,botCol){const key=topCol+'_'+botCol;if(key===_skyKey)return;_skyKey=key;
    skyG.clear();const N=40;for(let i=0;i<N;i++){const tt=i/(N-1);const cc=lerpColor(topCol,botCol,tt);
      skyG.beginFill(cc,1).drawRect(0,H*i/N,W,H/N+1).endFill();}}
  drawSky(C.bgTop,C.bgBot);
  // ColorMatrix grade on bgLayer (per-section)
  const bgGrade=new PIXI.ColorMatrixFilter(); bgLayer.filters=[bgGrade];
  // bgLayer filter intent flags (composed once per frame in render — never reassigned by scenes)
  const bgIntent={godray:false,kawase:false,hsl:false};

  // static shelf-wall silhouette (cacheAsBitmap)
  const shelves=new PIXI.Graphics();
  shelves.lineStyle(2,0x0c2433,0.5);
  for(let x=120;x<=1160;x+=58){ shelves.moveTo(x,60); shelves.lineTo(x,300); }
  for(let y=60;y<=300;y+=48){ shelves.moveTo(120,y); shelves.lineTo(1160,y); }
  shelves.lineStyle(0); shelves.beginFill(0x0c2433,0.18).drawRect(110,52,1060,256).endFill();
  bgLayer.addChild(shelves); shelves.cacheAsBitmap=true;

  // tiling dust band (slow upward drift)
  const dustTile=new PIXI.TilingSprite(GLOW.gold,W,H);
  dustTile.alpha=0.05; dustTile.blendMode=PIXI.BLEND_MODES.ADD; dustTile.tint=0xFFE9A8;
  dustTile.tileScale.set(2.2,2.2);
  bgLayer.addChild(dustTile);

  // reflection band (bottom) — ReflectionFilter applied to a thin graphics strip
  const reflStrip=new PIXI.Graphics();
  reflStrip.beginFill(0x0a1d2b,0.18).drawRect(0,640,W,80).endFill();
  bgLayer.addChild(reflStrip);
  let reflF=null;
  if(hasF('ReflectionFilter')){ reflF=new F.ReflectionFilter({mirror:true,boundary:0.0,amplitude:[0,4],waveLength:[40,120],alpha:[0.3,0.3],time:0}); reflStrip.filters=[reflF]; reflStrip.filterArea=new PIXI.Rectangle(0,640,W,80); }

  // ============================================================
  //  6) AMBIENT MOTES (persistent ParticleContainer)
  // ============================================================
  const MOTE_COUNT=220;
  const motePC=new PIXI.ParticleContainer(MOTE_COUNT,{position:true,rotation:false,scale:true,alpha:true,tint:false},MOTE_COUNT,true);
  fxLayer.addChild(motePC);
  const motes=[];
  for(let i=0;i<MOTE_COUNT;i++){const s=new PIXI.Sprite(GLOW.gold);s.anchor.set(0.5);s.tint=0xFFE9A8;s.blendMode=PIXI.BLEND_MODES.ADD;
    s.x=Math.random()*W;s.y=Math.random()*H;s.scale.set(0.06+Math.random()*0.16);s.alpha=0;motePC.addChild(s);
    motes.push({s,vx:(Math.random()-.5)*8,vy:-(5+Math.random()*16),phs:Math.random()*TAU,sp:0.5+Math.random(),baseScale:s.scale.x});}
  let RT=0;             // current audio time (s), set at the top of render(t) — for f(t) pulses outside render's arg scope
  let moteEnvelope=0;   // 0..1 global mote brightness (set from render)
  let moteVisibleRatio=1; // S20 thinning

  // ============================================================
  //  7) SHARED VECTOR ACTOR BUILDERS
  // ============================================================
  // open-book vector
  function drawBook(g,tone,rim,sc){
    g.clear();
    const w=70*sc,h=46*sc;
    // left page
    g.beginFill(tone,0.96).lineStyle(2.4,rim,1);
    g.moveTo(-w,-h*0.2); g.bezierCurveTo(-w*0.6,-h*0.9,-w*0.1,-h*0.7,0,-h*0.35);
    g.lineTo(0,h*0.6); g.bezierCurveTo(-w*0.1,h*0.2,-w*0.6,h*0.35,-w,h*0.45); g.closePath(); g.endFill();
    // right page
    g.beginFill(tone,0.96).lineStyle(2.4,rim,1);
    g.moveTo(w,-h*0.2); g.bezierCurveTo(w*0.6,-h*0.9,w*0.1,-h*0.7,0,-h*0.35);
    g.lineTo(0,h*0.6); g.bezierCurveTo(w*0.1,h*0.2,w*0.6,h*0.35,w,h*0.45); g.closePath(); g.endFill();

  // a reader figure (head + shoulders) at local 0,0 sitting

  // signpost lamp (arm + hanging lamp). pivot at LAMP. Built to aim along +x by default; rotation aims it.
  function buildSignpost(){

  // canonical reader beam (LAMP -> aim) as SimpleRope
  function makeBeam(tint){
    const pts=[]; for(let i=0;i<8;i++) pts.push(new PIXI.Point(0,0));
    const r=new PIXI.SimpleRope(TRAIL.cyan,pts); r.blendMode=PIXI.BLEND_MODES.ADD; r.tint=tint||0x9af0fb; r.alpha=0.5;
    r._pts=pts; return r;
  }
  function setBeam(rope,from,to){
    const p=rope._pts; for(let i=0;i<p.length;i++){const f=i/(p.length-1);p[i].x=lerp(from[0],to[0],f);p[i].y=lerp(from[1],to[1],f);}
  }
  // SimpleRope path trail with N control points (transient ghost runs / red trails)
  function makeTrail(tint,n){
    const pts=[]; for(let i=0;i<(n||10);i++) pts.push(new PIXI.Point(0,0));
    const r=new PIXI.SimpleRope(tint===0xff6a6a?TRAIL.red:TRAIL.cyan,pts); r.blendMode=PIXI.BLEND_MODES.ADD; r.tint=tint; r.alpha=0;
    r._pts=pts; return r;
  }
  // set a 3-point smooth path into a rope's points
  function setRopeAlongPath(rope,path){
    const p=rope._pts; const segs=path.length-1;
    for(let i=0;i<p.length;i++){
      const f=i/(p.length-1)*segs; const si=Math.min(segs-1,Math.floor(f)); const lf=f-si;
      p[i].x=lerp(path[si][0],path[si+1][0],lf); p[i].y=lerp(path[si][1],path[si+1][1],lf);
    }
  }
  // hourglass vector
  function drawHourglass(g,sc,fill){
    g.clear(); const w=26*sc,h=40*sc;
    g.lineStyle(3,0xc9a26b,1).beginFill(0x0a1d2b,0.3);
    g.moveTo(-w,-h).lineTo(w,-h).lineTo(2,0).lineTo(w,h).lineTo(-w,h).lineTo(-2,0).closePath().endFill();
    g.lineStyle(0).beginFill(0xFFD34D,0.85);
    // top sand
    const tf=clamp01(1-fill); g.moveTo(-w*0.85*tf,-h*0.9).lineTo(w*0.85*tf,-h*0.9).lineTo(1,-h*0.05*tf).lineTo(-1,-h*0.05*tf).closePath();
    g.endFill();
    g.beginFill(0xFFD34D,0.85);
    const bf=clamp01(fill); g.moveTo(-w*0.85*bf,h*0.9).lineTo(w*0.85*bf,h*0.9).lineTo(1,h*0.1).lineTo(-1,h*0.1).closePath();
    g.endFill();
    g.lineStyle(4,0xb98a3a,1).moveTo(-w-2,-h-3).lineTo(w+2,-h-3); g.moveTo(-w-2,h+3).lineTo(w+2,h+3);
  }

  // ============================================================
  //  8) PERSISTENT LOUNGE (in sceneLayer-persistent group below scene actors)

  // ============================================================
  const loungeRoot=new PIXI.Container(); sceneLayer.addChild(loungeRoot);

  // persistent active book (v-current). lives in loungeRoot.

  let godrayOn=true;

  // 12 persistent reader tables (loungeRoot) — figure + desk + lamp dot + beam + seatGaze
  const READERS=[];
  for(let k=0;k<N_LANES;k++){
    const cont=new PIXI.Container(); loungeRoot.addChild(cont);
    const sx=tableX(k),sy=rowY(k); cont.position.set(sx,sy);
    const desk=new PIXI.Graphics(); drawDesk(desk); cont.addChild(desk);
    const fig=new PIXI.Graphics(); drawReader(fig,C.accent2); cont.addChild(fig);
    const lampDot=new PIXI.Graphics(); cont.addChild(lampDot);
    // beam (world-space child of loungeRoot, not the table container, since origin is LAMP)
    const beam=makeBeam(C.reader); loungeRoot.addChildAt(beam,1); // above sky-of-scene
    // seatGaze (static decoration) world-space rope
    const gaze=makeBeam(C.reader); loungeRoot.addChildAt(gaze,1); gaze.alpha=0;
    setRopeAlongPath(gaze,[ [sx,sy-18],[lerp(sx,710,0.6),300],[710,210] ]);
    READERS.push({k,cont,desk,fig,lampDot,beam,gaze,sx,sy});
  }
  // beamAim binding state (per lane). 'v1'|'v2'|'v3' or animated via reaim.
  // We compute beamAim(k,t) as pure function of t using a binding schedule.
  // bindings: array per lane describing reaim segments.
  // Default before S6: all v1.
  function bookSlotFor(which){ return which==='v3'?BOOK_V3:which==='v2'?BOOK_V2:BOOK_V1; }
  // beamAim returns [x,y] for lane k at time t
  function beamAim(k,t){
    // S13 reprise: after 99.40, non-pinned move v2->v3
    if(t>=98.59){
      // reaim schedule S13 (faster). non-pinned use sorted-rank
      const isPin=(k===2||k===5||k===8);
      if(isPin){
        // small in-progress pinned subset keep v2 (then eventually align). keep v2 through S13.
        return BOOK_V2;
      }
      const rank=NONPIN.indexOf(k);
      const at=99.40+rank*0.12;
      const p=easeInOut(ph(t,at,at+0.35));
      return lerp2(BOOK_V2,BOOK_V3,p);
    }
    // S6 swap: after 45.95, non-pinned move v1->v2
    if(t>=45.18){
      const isPin=(k===2||k===5||k===8);
      if(isPin){
        // pinned stay v1 until they flip (S10). lane5 flips @82.88, lane2 @79.00, lane8 @79.45
        if(k===2 && t>=79.00) { /* after flip beam fades anyway */ return BOOK_V1; }
        if(k===8 && t>=79.45) { return BOOK_V1; }
        return BOOK_V1;
      }
      const rank=NONPIN.indexOf(k);
      const at=46.20+rank*0.18;
      const p=easeInOut(ph(t,at,at+0.45));
      return lerp2(BOOK_V1,BOOK_V2,p);
    }
    return BOOK_V1;
  }
  // active edition slot for the lamp/book at time t
  function activeSlot(t){ if(t>=98.59) return BOOK_V3; if(t>=45.18) return BOOK_V2; return BOOK_V1; }
  function activeTone(t){ if(t>=98.59) return [C.v3,'v3']; if(t>=45.18) return [C.v2,'v2']; return [C.v1,'v1']; }
  function lampAngle(t){
    if(t>=98.59){ return lerp(angleToV2,angleToV3,easeOutBack(ph(t,98.59,99.40))); }
    if(t>=45.18){ return lerp(angleToV1,angleToV2,easeOutBack(ph(t,45.18,46.20))); }
    return angleToV1 + (t>=10.48&&t<20.14? 0.04*Math.sin(t*0.8):0); // S2 idle sway
  }
  // pinned lane green-flip alphas (S10)
  function lane2green(t){return ph(t,79.00,79.50);}
  function lane8green(t){return ph(t,79.45,79.95);}
  function lane5green(t){return ph(t,82.88,83.40);}

  // ============================================================
  //  9) CAMERA RIG (GOLDEN RULE: all camera state is f(audio.currentTime))
  // ============================================================
  let camDollyScale=1;   // per-scene dolly scale target (set by scenes)
  let camPivotX=W/2,camPivotY=H/2;
  // --- screen shake as a PURE FUNCTION OF TIME (no accumulator, no Math.random) ---
  // Each event is a closed-form exponential-decay envelope from its trigger time, matching the
  // previous per-frame decay (factor 0.0009 per second). Seeking to any t reproduces the exact value.
  const SHAKE_DECAY=0.0009; // per-second decay base (== old SHAKE*=pow(0.0009,dt))
  function shakeEnv(t,t0,amp){ return t<t0?0:amp*Math.pow(SHAKE_DECAY,t-t0); }
  // Scheduled one-shot camera shakes (amp px, decaying): S4 counter punch, S6 swap, S13 swap, S15 collapse.
  function shakeAmp(t){
    let a=0;
    a+=shakeEnv(t,32.46,3);    // S4  1024-counter punch
    a+=shakeEnv(t,45.95,4);    // S6  atomic swap
    a+=shakeEnv(t,99.05,3);    // S13 swap reprise
    a+=shakeEnv(t,131.53,10);  // S15 RW-lock collapse
    // S11 continuous unease (amp 2px) over 88.41..95.0, ramping out 93.0..95.0
    if(t>=88.41 && t<95.0){ a=Math.max(a,2*(1-ph(t,93.0,95.0))); }
    return a<0.05?0:a;
  }
  // deterministic value-noise jitter in [-0.5,0.5], reproducible from t (so seek is correct).
  function hash01(n){ const s=Math.sin(n)*43758.5453123; return s-Math.floor(s); }
  function shakeJitter(t,axis){
    // sample a fast pseudo-noise keyed on time (rounded to ~ms) and axis so x/y differ
    const n=Math.floor(t*1000)*0.001*137.13+axis*57.31;
    return hash01(n)-0.5;
  }
  function updateCamera(t,dt){
    // beat breathing * per-scene dolly
    const bAmp=beatAmp(t);
    let sc=(1+bAmp*0.012*beat(t))*camDollyScale;
    cameraRoot.scale.set(sc);
    cameraRoot.pivot.set(camPivotX,camPivotY);
    // keep the world pivot point fixed at its own screen coordinate => position = pivot
    let px=camPivotX, py=camPivotY;
    // shake (pure function of t: closed-form decay envelope * deterministic jitter)
    const sa=shakeAmp(t);
    if(sa>0){ px+=shakeJitter(t,0)*sa; py+=shakeJitter(t,1)*sa; }
    cameraRoot.position.set(px,py);
  }

  // ============================================================

  const SC=[];

  let activeIdx=-1;

    activeIdx=i;

    if(s&&!s.inst){ s.fired=new Set(); s.lastLocal=-1; s.inst=s.build(s); s.inst.c.alpha=0; sceneRoot.addChild(s.inst.c); }
  }

  // ============================================================

  // ============================================================
  //  RENDER HELPERS for lounge persistent elements
  // ============================================================
  function renderLounge(t,sec){
    // lamp angle + bloom
    signpost.rotation=lampAngle(t);
    if(signpost._bloom){ signpost._bloom.bloomScale=1.0+0.3*beat(t); }
    signpost._glow.scale.set(1.0+0.12*beat(t));
    // active book tone + pos + flag
    const [tone,which]=activeTone(t);
    const slot=activeSlot(t);
    activeBook._tone=tone;
    // book breathing (S2 stronger)
    let bsc=0.85;
    if(t>=10.48&&t<20.14) bsc=0.85+0.02*Math.sin(t*1.5);
    drawBook(activeBookG,tone,activeBook._rim,bsc);
    activeBook.position.set(slot[0],slot[1]);
    const flagCol=which==='v1'?C.accent:which==='v3'?C.v3:C.v2;
    bookFlag.text=which; bookFlag.style.fill=flagCol;
    if(activeBook._glow){ activeBook._glow.outerStrength=1.5+0.6*beat(t); activeBook._glow.color=flagCol; }
    // null-safe hero book images over the active book (v1 tan → book-v1, v2/v3 cyan → book-v2)
    if(IMG_SPRITES['book-v1']) IMG_SPRITES['book-v1'].visible=(which==='v1');
    if(IMG_SPRITES['book-v2']) IMG_SPRITES['book-v2'].visible=(which!=='v1');
    // readers
    const lwAmp=lampWaveAmp(t);
    for(const R of READERS){
      const k=R.k;
      // beam aim
      const aim=beamAim(k,t);
      setBeam(R.beam,LAMP,aim);
      // beam alpha + pinned dim + flip fade
      let bAlpha=0.5*(0.95+0.05*Math.sin(t*2+k));
      const isPin=(k===2||k===5||k===8);
      if(isPin && t>=45.95 && t<98.59){ bAlpha=lerp(0.5,0.4,ph(t,45.95,47.0)); }
      // pinned flips: fade their v1 beam at flip
      if(k===2 && t>=79.00) bAlpha=0.4*(1-lane2green(t));
      if(k===8 && t>=79.45) bAlpha=0.4*(1-lane8green(t));
      if(k===5 && t>=82.88) bAlpha=0.4*(1-lane5green(t));
      R.beam.alpha=clamp01(bAlpha);
      R.gaze.alpha=0.30;
      // lamp dot color (cyan reading / green quiescent / red asleep) — base wave
      let dotCol=C.reader;
      let dotA=0.6+lwAmp*0.4*beat(t-k*0.06);
      // green flips ONLY during the S9/S10 grace cycle window (71.98..87.06)
      if(t>=71.98 && t<87.06){

        else if(k===8) greenLevel=lane8green(t);
        else if(k===5) greenLevel=lane5green(t);
        else if(NONPIN.indexOf(k)>=0){ const rank=NONPIN.indexOf(k); const gk=75.45+rank*0.40; greenLevel=ph(t,gk,gk+0.3); }

      // (handled in render via sec override below)
      if(title._g) title._g.outerStrength=lerp(1.5,0.2,easeInOut(q));
      if(bloomF) bloomF.bloomScale=1.0+0.25*Math.exp(-Math.pow((t-185.0),2)/0.3);
    },destroy(){ moteVisibleRatio=1; }};
  });

  // ============================================================
  //  SECTION / GRADE per scene
  // ============================================================
  function sectionGrade(t,sec){
    bgGrade.reset();
    if(sec==='bridge' && t<135.88){
      // cold desaturate during RW-lock
      const cold=ph(t,121.58,123.5);
      bgGrade.saturate(-0.4*cold,false);
      bgGrade.brightness(1-0.12*cold,true);
    } else if(sec==='chorus'){
      bgGrade.saturate(0.18,false);
    } else if(sec==='outro'){
      bgGrade.saturate(0.06,false);
    } else {
      bgGrade.saturate(0.1,false);
    }
  }

  // ============================================================
  //  KARAOKE (DOM)
  // ============================================================
  const subEl=document.getElementById('subtitle'), secEl=document.getElementById('seclabel');
  let curLine=-1, wordEls=[];
  function buildLine(L){ subEl.innerHTML=''; wordEls=[];
    L.words.forEach(w=>{ const kw=document.createElement('span'); kw.className='kw';
      const wb=document.createElement('span'); wb.className='wb'; wb.textContent=w.w;
      const wf=document.createElement('span'); wf.className='wf'; wf.textContent=w.w;
      kw.append(wb,wf); subEl.append(kw,document.createTextNode(' ')); wordEls.push({w,wf,kw}); });
  }
  const FIRST_WORD_START=800, LAST_WORD_END=177320;
  function pickLine(ms){
    if(ms<FIRST_WORD_START || ms>LAST_WORD_END) return null;
    for(const ln of LINES){ if(ms>=ln.start_ms-250 && ms<=ln.end_ms+600) return ln; }
    return null;
  }
  function renderKaraoke(t){
    const ms=t*1000;
    const ln=pickLine(ms);
    if(!ln){ if(curLine!==-1){ curLine=-1; subEl.innerHTML=''; wordEls=[]; } return; }
    const li=LINES.indexOf(ln);
    if(li!==curLine){ curLine=li; buildLine(ln); }
    for(const we of wordEls){ const w=we.w; const dur=Math.max(120,w.end_ms-w.start_ms);
      const p = ms>=w.end_ms?1: ms>=w.start_ms?(ms-w.start_ms)/dur:0;
      we.wf.style.width=(clamp01(p)*100)+'%';
      const active=(ms>=w.start_ms && ms<w.end_ms);
      if(active) we.kw.classList.add('active'); else we.kw.classList.remove('active');
    }
  }

  // ============================================================
  //  MAIN RENDER (pure function of t)
  // ============================================================
  function currentSceneIndex(t){ let si=0; for(let i=0;i<SC.length;i++){ if(t>=SC[i].t0) si=i; } return si; }
  function render(t){
    RT=t;
    const dt=app.ticker.deltaMS/1000;
    // reset transient bg-filter intents each frame (only the owning scene's update sets them true)
    bgIntent.kawase=false; bgIntent.hsl=false;
    // reset chorus lamp override each frame (only an active chorus re-enables it)
    chorusGreenOverride.active=false; chorusGreenOverride.flickerK4=0;
    // section
    const si=currentSceneIndex(t);
    const sc=SC[si];
    const sec=sc.sec;
    // ----- background gradient (section-aware) -----
    let top=C.bgTop, bot=C.bgBot;
    if(sec==='bridge' && t<135.88){ const cold=ph(t,121.58,123.5); top=lerpColor(C.bgTop,C.bgTopCold,cold); bot=lerpColor(C.bgBot,C.bgBotCold,cold); }
    else if(sec==='bridge' && t>=135.88){ const warm=ph(t,135.88,136.3); top=lerpColor(C.bgTopCold,C.bgTop,warm); bot=lerpColor(C.bgBotCold,C.bgBot,warm); }
    if(t>=177.32){ const q=easeInOut(ph(t,177.32,187.0)); top=lerpColor(top,0x06141f,q); bot=lerpColor(bot,0x04111a,q); }
    drawSky(top,bot);
    sectionGrade(t,sec);
    // dust drift
    dustTile.tilePosition.y=(-(t*18))%256; dustTile.alpha=0.05*moteEnvelope/0.3;
    if(reflF) reflF.time=t;
    if(godrayF){ godrayF.time=t; }
    // godray wanted in lounge/outro only (intent flag; bgLayer.filters composed below after scene update)
    bgIntent.godray=(sec==='intro'||sec==='chorus'||sec==='outro');

    // ----- scene manager (with backward-jump reset) -----
    // backward jump WITHIN the currently-active scene -> reset one-shot 'fired' set
    if(si===activeIdx){ const a=SC[activeIdx]; const localT=t-a.t0; if(a.inst && a.lastLocal>=0 && localT < a.lastLocal-0.05){ a.fired=new Set(); } }
    setSceneByIndex(si);
    const cur=SC[activeIdx];
    if(cur && cur.inst){
      cur.inst.c.alpha=lerp(cur.inst.c.alpha,1,0.12);
      try{ cur.inst.update(t-cur.t0,t); }catch(e){ showErr('scene '+cur.name+': '+e.message); }
      cur.lastLocal=t-cur.t0;
    }
    // ----- compose bgLayer.filters once per frame from intent flags -----
    { const arr=[bgGrade];
      if(bgIntent.kawase && FILT.kawase) arr.push(FILT.kawase);
      if(bgIntent.hsl && FILT.hsl) arr.push(FILT.hsl);
      if(bgIntent.godray && godrayF) arr.push(godrayF);
      bgLayer.filters=arr;
    }

    // ----- lounge persistence -----
    // hide lounge actors during the cold RW-lock (S15 only, before cut-back)
    let loungeAlpha=1;
    if(sec==='bridge'){
      if(t<135.88){ loungeAlpha=1-ph(t,121.58,122.6); }
      else { loungeAlpha=easeOut(ph(t,135.88,137.2)); }
      if(t>=142.30) loungeAlpha=1; // S17 lounge dimly present; keep persistent room visible
    }
    loungeRoot.alpha=clamp01(loungeAlpha);
    // S0/S20 reader visibility handled per-scene; otherwise readers shown if past S1 entrance
    if(t>=0.80){ for(const R of READERS){ if(R.cont.alpha<1 && t>10.48 && sec!=='bridge'){ R.cont.alpha=1; } } }
    // chorus green override for reader lamps
    renderLounge(t,sec);
    // apply chorus green override on top of base lamp draw (illustrative L2 cycle)
    if(chorusGreenOverride.active){
      const doctou=chorusGreenOverride.doctou, L4=chorusGreenOverride.L4;
      for(const R of READERS){ const k=R.k;
        let gAt=doctou+k*0.05; if(k===11) gAt=doctou+0.55+0.30;
        let gl=ph(t,gAt,gAt+0.25);
        if(t>=L4) gl=clamp01(gl)*(1-ph(t,L4,L4+0.25));
        let col=lerpColor(C.reader,C.quiescent,clamp01(gl));
        // L3 sleeping flicker on k=4
        if(k===4 && chorusGreenOverride.flickerK4>0){ col=lerpColor(col,C.danger,chorusGreenOverride.flickerK4); }
        R.lampDot.clear(); R.lampDot.beginFill(col,0.6+lampWaveAmp(t)*0.4*beat(t-k*0.06)).drawCircle(0,52,5).endFill();
      }
    }

    // ----- camera -----
    updateCamera(t,dt);

    // ----- karaoke -----
    renderKaraoke(t);
    secEl.textContent=sc.name; secEl.style.opacity=0.85;

    // ----- controls -----
    const dur=(player.duration&&isFinite(player.duration))?player.duration:STAGE_DUR;
    if(!seekDragging){ seek.value=t; seek.style.setProperty('--p',(t/dur*100)+'%'); }
    tCur.textContent=fmt(t);
  }

  // ============================================================
  //  AMBIENT (deltaMS) — motes + sparks (non-load-bearing)
  // ============================================================
  app.ticker.add(()=>{
    const dt=app.ticker.deltaMS/1000;
    // Ambient motes/sparks advance ONLY while the audio is actually playing. Pausing the video
    // freezes them (their drift/twinkle stops), so a paused frame is fully static — the rest of
    // the scene is already a pure function of audio time. (Their brightness still tracks the
    // f(t) envelope so a paused seek shows the correct mote level; only the motion is frozen.)
    const playing = !player.paused && !player.ended;
    for(let i=0;i<motes.length;i++){ const m=motes[i];
      if(playing){ m.s.x+=m.vx*dt; m.s.y+=m.vy*dt; m.phs+=dt*m.sp;
        if(m.s.y<-20){ m.s.y=H+20; m.s.x=Math.random()*W; } }
      const visible=(i/motes.length)<moteVisibleRatio || i< motes.length*0.18;
      m.s.alpha=visible? moteEnvelope*(0.7+0.5*Math.sin(m.phs)) : 0;
    }
    if(playing){
      for(let i=sparks.length-1;i>=0;i--){ const s=sparks[i]; s.life+=dt; s.s.x+=s.vx; s.s.y+=s.vy; s.vy+=0.04; s.s.alpha=0.9*(1-s.life/s.max);
        if(s.life>=s.max){ s.s.destroy(); sparks.splice(i,1); } }
    }
    render(player.currentTime||0);
  });

  // ============================================================
  //  PLAYER + CONTROLS
  // ============================================================
  const bigplay=document.getElementById('bigplay'), btnPlay=document.getElementById('btnPlay'), btnRestart=document.getElementById('btnRestart');
  const seek=document.getElementById('seek'), tCur=document.getElementById('tCur'), tDur=document.getElementById('tDur');
  let seekDragging=false;
  const fmt=s=>{s=Math.max(0,s|0);return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');};
  player.addEventListener('loadedmetadata',()=>{ const d=(player.duration&&isFinite(player.duration))?player.duration:STAGE_DUR; seek.max=d; tDur.textContent=fmt(d); });
  function play(){ player.play().catch(e=>showErr('play: '+e.message)); bigplay.classList.add('hidden'); btnPlay.textContent='⏸'; }
  function pause(){ player.pause(); btnPlay.textContent='▶'; }
  bigplay.addEventListener('click',play);
  btnPlay.addEventListener('click',()=>player.paused?play():pause());
  btnRestart.addEventListener('click',()=>{ player.currentTime=0; play(); });
  player.addEventListener('ended',()=>{ btnPlay.textContent='▶'; bigplay.classList.remove('hidden'); const h=bigplay.querySelector('.hint'); if(h) h.innerHTML='Přehrát znovu?'; });
  seek.addEventListener('input',()=>{ seekDragging=true; const v=parseFloat(seek.value); __seek(v); });
  seek.addEventListener('change',()=>{ seekDragging=false; });
  document.addEventListener('keydown',e=>{ const dur=(player.duration&&isFinite(player.duration))?player.duration:STAGE_DUR;
    if(e.code==='Space'){ e.preventDefault(); player.paused?play():pause(); }
    else if(e.code==='ArrowRight'){ player.currentTime=Math.min(dur,player.currentTime+5); }
    else if(e.code==='ArrowLeft'){ player.currentTime=Math.max(0,player.currentTime-5); }
    else if(e.key==='r'||e.key==='R'||e.code==='Home'){ player.currentTime=0; play(); }
  });

  // ============================================================
  //  TEST HOOKS
  // ============================================================
  window.__APP__=app; window.__AUDIO__=player;
  window.__seek=function(t){
    const dur=(player.duration&&isFinite(player.duration))?player.duration:STAGE_DUR;
    t=clamp(t,0,dur);
    if(player.readyState>0){ try{ player.currentTime=t; }catch(e){} }
    render(t);
    try{ app.renderer.render(app.stage); }catch(e){}
  };

  // initial render
  try{ render(0); }catch(e){ showErr('init render: '+e.message); }
  window.__READY__=true;

  })();</script>
</body>
</html>
